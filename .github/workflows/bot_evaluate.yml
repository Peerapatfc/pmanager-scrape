name: Bot Evaluate Worker

on:
  schedule:
    # Run once daily at 02:00 UTC (~58 min/run × 30 = ~1,740 min/month, within free tier)
    - cron: '0 2 * * *'

  workflow_dispatch:

jobs:
  evaluate_bots:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check src/

      - name: Run unit tests
        run: pytest tests/ -v

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Create .env file
        run: |
          echo "PM_USERNAME=${{ secrets.PM_USERNAME }}" > .env
          echo "PM_PASSWORD=${{ secrets.PM_PASSWORD }}" >> .env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
          chmod 600 .env

      - name: Run Bot Evaluate Worker
        run: python main_bot_evaluate.py

      - name: Upload Evaluation Batch artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-evaluations-${{ github.run_number }}
          path: |
            bot_evaluations_batch.csv
          retention-days: 7

      - name: Cleanup sensitive files
        if: always()
        run: rm -f .env credentials.json

      - name: Notify failure via Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ Workflow '${{ github.workflow }}' failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
