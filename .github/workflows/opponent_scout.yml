name: Opponent Scout

on:
  workflow_dispatch:
    inputs:
      scout_target:
        description: 'Team ID or URL to scout'
        required: true
        type: string

jobs:
  scout_opponent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps chromium

    - name: Create credentials.json
      run: |
        echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

    - name: Create .env file
      run: |
        echo "PM_USERNAME=${{ secrets.PM_USERNAME }}" >> .env
        echo "PM_PASSWORD=${{ secrets.PM_PASSWORD }}" >> .env
        echo "CI=true" >> .env

    - name: Run Opponent Scout
      run: python main_opponent_scout.py "${{ github.event.inputs.scout_target }}"
